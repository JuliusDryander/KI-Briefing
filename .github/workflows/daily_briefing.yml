name: Daily KI-Briefing

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-genai beautifulsoup4 playwright
          playwright install chromium

      - name: Run scraper (Podscripts + RSS fallback)
        id: scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: |
          if python scraper.py; then
            if [ -f latest.txt ] || [ -f briefing.md ]; then
              echo "has_new=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_new=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate briefing with Gemini
        if: steps.scraper.outputs.has_new == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: 1
        run: |
          if [ ! -f briefing_from_audio.flag ]; then
            python briefing.py
          else
            echo "Briefing bereits aus Audio erstellt, überspringe briefing.py"
          fi

      - name: Generate email HTML
        if: steps.scraper.outputs.has_new == 'true'
        run: |
          if [ -f briefing.md ] && [ -f email_template.py ]; then
            python -c "
          from email_template import convert_md_to_email
          with open('briefing.md', 'r') as f:
              md = f.read()
          html = convert_md_to_email(md)
          with open('briefing_email.html', 'w') as f:
              f.write(html)
          print(f'Email-HTML erstellt: {len(html)} Zeichen')
          "
          fi

      - name: Write status file
        run: |
          if [ "${{ steps.scraper.outputs.has_new }}" = "true" ]; then
            echo '{"status":"new_briefing","date":"'$(date -u +'%Y-%m-%d')'"}' > status.json
          else
            echo '{"status":"no_update","date":"'$(date -u +'%Y-%m-%d')'"}' > status.json
          fi

      - name: Cleanup temp files
        run: rm -f briefing_from_audio.flag audio_briefing_supplement.md

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Briefing $(date -u +'%Y-%m-%d')"
          git push
