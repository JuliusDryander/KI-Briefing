name: Daily KI-Briefing

on:
  schedule:
    # Jeden Tag um 10:00 UTC (11:00 Berlin Winterzeit, 12:00 Sommerzeit)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Manuelles Auslösen möglich

permissions:
  contents: write

jobs:
  scrape-and-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Repo auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python einrichten
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Dependencies installieren
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # 4. Scraper ausführen → erzeugt latest.txt
      - name: Run scraper
        run: python scraper.py

      # 5. Briefing erstellen → erzeugt briefing.md
      - name: Generate briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing.py

      # 6. Dateien committen und pushen
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update $(date +'%Y-%m-%d'): Transkript + Briefing"
          git push
