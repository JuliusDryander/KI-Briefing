name: Daily KI-Briefing

on:
  schedule:
    # Montag-Freitag um 05:00 UTC (06:00 Berlin Winterzeit, 07:00 Sommerzeit)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:  # Manuelles Auslösen möglich

permissions:
  contents: write

jobs:
  scrape-and-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Repo auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python einrichten
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Dependencies installieren
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # 4. Scraper ausführen → erzeugt latest.txt (nur bei neuen Episoden)
      - name: Run scraper
        id: scraper
        run: |
          python -c "
          from scraper import scrape_all
          has_new = scrape_all()
          # Ergebnis als GitHub Output setzen
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has_new={str(has_new).lower()}\n')
          "

      # 5. Briefing erstellen → NUR wenn neue Episoden da sind
      #    Erzeugt briefing.md + briefing_email.html
      - name: Generate briefing
        if: steps.scraper.outputs.has_new == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefing.py

        # 6. Status-Datei schreiben (für Make.com)
      - name: Write status file
        run: |
        if [ "${{ steps.scraper.outputs.has_new }}" = "true" ]; then 
        echo '{"status":"new_briefing","date":"'$(date -u +'%Y-%m-%d')'"}' > status.json
        else
        echo '{"status":"no_update","date":"'$(date -u +'%Y-%m-%d')'"}' > status.json
        fi

      # 7. Dateien committen und pushen
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update $(date +'%Y-%m-%d'): Transkript + Briefing"
          git push
